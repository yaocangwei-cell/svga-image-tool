<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>聊天室 Q 版跳绳 Demo (多队伍版)</title>
    <style>
        /* 基础重置 */
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0; 
            background-color: #1a1a2e; 
            display: flex; justify-content: center; align-items: center;
            height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }

        /* 手机屏幕模拟容器 */
        #mobile-container {
            width: 100%;
            height: 100%;
            max-width: calc(100vh * (720 / 1560));
            max-height: calc(100vw * (1560 / 720));
            aspect-ratio: 720 / 1560;
            position: relative; overflow: hidden;
            background-color: #1a1a2e; 
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        /* 1层：动态视频背景 */
        #bg-video {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1; 
        }

        /* 2层：模拟房间 UI 遮罩层 */
        #ui-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://i.imgur.com/W2LQgSy.png'); 
            background-size: 100% 100%; z-index: 5; pointer-events: none; 
        }

        /* 3层：游戏层 */
        #gameCanvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10;
        }

        /* 4层：控制层 */
        #game-controls {
            position: absolute; top: 15%; left: 0; width: 100%;
            display: flex; flex-direction: column; align-items: center; z-index: 20;
            pointer-events: none; 
        }
        .score-display { 
            color: #fff; font-size: 20px; font-weight: bold; 
            text-shadow: 0 2px 10px rgba(0,0,0,0.8), 0 0 5px #f1c40f; 
            margin-bottom: 20px;
        }
        #timingBar {
            width: 240px; height: 14px; background: rgba(0, 0, 0, 0.6);
            border-radius: 7px; border: 2px solid rgba(255,255,255,0.4);
            position: relative; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        #timingZone { position: absolute; height: 100%; background: rgba(46, 204, 113, 0.6); transition: background 0.1s; }
        #timingZone.active { background: rgba(46, 204, 113, 1); box-shadow: 0 0 10px rgba(46, 204, 113, 0.8); }
        #timingCursor {
            position: absolute; top: -2px; width: 4px; height: 18px; background: #e74c3c;
            border-radius: 2px; box-shadow: 0 0 5px #e74c3c; transition: transform 0.1s;
        }
        #timingCursor.active { background: #2ecc71; box-shadow: 0 0 10px #2ecc71; transform: scale(1.3); }
    </style>
</head>
<body>

    <div id="mobile-container">
        <!-- 动态视频背景层 -->
        <video id="bg-video" autoplay loop muted playsinline>
            <source src="https://i.imgur.com/jyr0nPx.mp4" type="video/mp4">
        </video>

        <!-- UI 遮罩层 -->
        <div id="ui-overlay"></div>

        <!-- 游戏渲染画布 -->
        <canvas id="gameCanvas"></canvas>

        <!-- 游戏控制与分数 -->
        <div id="game-controls">
            <div class="score-display">Combo: <span id="scoreVal">0</span></div>
            <div id="timingBar">
                <div id="timingZone"></div>
                <div id="timingCursor"></div>
            </div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('scoreVal');
    const timingZoneEl = document.getElementById('timingZone');
    const timingCursorEl = document.getElementById('timingCursor');

    function hexToRgb(hex) {
        let result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : { r: 241, g: 196, b: 15 };
    }

    // ==========================================
    // 序列帧资产接入
    // ==========================================
    const idleSprite = new Image(); idleSprite.crossOrigin = "Anonymous"; idleSprite.src = "https://i.imgur.com/WMzjNCZ.png"; 
    const fallSprite = new Image(); fallSprite.crossOrigin = "Anonymous"; fallSprite.src = "https://i.imgur.com/0Bxiqut.png"; 
    const getupSprite = new Image(); getupSprite.crossOrigin = "Anonymous"; getupSprite.src = "https://i.imgur.com/N9oybvX.png"; 
    const jumpUpSprite = new Image(); jumpUpSprite.crossOrigin = "Anonymous"; jumpUpSprite.src = "https://i.imgur.com/NLsZPLJ.png"; 
    const jumpDownSuccSprite = new Image(); jumpDownSuccSprite.crossOrigin = "Anonymous"; jumpDownSuccSprite.src = "https://i.imgur.com/Oah20Zu.png"; 
    const jumpDownFailSprite = new Image(); jumpDownFailSprite.crossOrigin = "Anonymous"; jumpDownFailSprite.src = "https://i.imgur.com/RHSnwfS.png"; 
    const vfxSprite = new Image(); vfxSprite.crossOrigin = "Anonymous"; vfxSprite.src = "https://i.imgur.com/KrJSSrq.png";

    let gameColors = { ropeColor: '#f1c40f' };

    let width, height;
    let teams = []; // 多队伍架构数组
    let activeVFX = []; 
    
    function resize() {
        const container = document.getElementById('mobile-container');
        width = container.clientWidth;
        height = container.clientHeight; 
        canvas.width = width;
        canvas.height = height;
        
        let groundY1 = height * 0.35; // 上方第一组位置
        let groundY2 = height * 0.52; // 下方第二组位置 (整体上移，之前是 0.65)
        
        if (teams.length === 0) {
            // 初始化两支队伍 (移除独立的 ropeAngle 和 ropeSpeed，统一由 gameState 管理)
            teams.push({ id: 1, isPlayerTeam: true, groundY: groundY1, chars: [] });
            teams.push({ id: 2, isPlayerTeam: false, groundY: groundY2, chars: [] });

            teams.forEach(team => {
                const centerX = width / 2;
                const spacing = width * 0.22; 
                team.chars.push(new Character(centerX - spacing * 1.5, team.groundY, 'AI'));
                
                // 只有第一支队伍有玩家控制
                if (team.isPlayerTeam) {
                    team.chars.push(new Character(centerX - spacing * 0.5, team.groundY, 'PLAYER'));
                } else {
                    team.chars.push(new Character(centerX - spacing * 0.5, team.groundY, 'AI'));
                }
                
                team.chars.push(new Character(centerX + spacing * 0.5, team.groundY, 'AI'));
                team.chars.push(new Character(centerX + spacing * 1.5, team.groundY, 'AI'));
            });
        } else {
            teams[0].groundY = groundY1;
            teams[1].groundY = groundY2;
            teams.forEach(team => {
                const centerX = width / 2;
                const spacing = width * 0.22; 
                team.chars[0].baseX = centerX - spacing * 1.5; team.chars[0].baseY = team.groundY;
                team.chars[1].baseX = centerX - spacing * 0.5; team.chars[1].baseY = team.groundY;
                team.chars[2].baseX = centerX + spacing * 0.5; team.chars[2].baseY = team.groundY;
                team.chars[3].baseX = centerX + spacing * 1.5; team.chars[3].baseY = team.groundY;
            });
        }
    }
    window.addEventListener('resize', resize);

    // ==========================================
    // 特效引擎 (VFX Particle System)
    // ==========================================
    class ComboVFX {
        constructor(x, y) {
            this.x = x + (Math.random() - 0.5) * 80;
            this.y = y + (Math.random() - 0.5) * 80;
            this.scale = 1 + Math.random() * 2;
            this.currentFrame = 0;
            this.frameTimer = 0;
            this.frameDuration = 33; 
            this.isFinished = false;
        }

        update(dt) {
            this.frameTimer += dt;
            if (this.frameTimer >= this.frameDuration) {
                this.currentFrame++;
                this.frameTimer = 0;
                if (this.currentFrame >= 18) {
                    this.isFinished = true;
                }
            }
        }

        draw(ctx) {
            if (this.isFinished || !vfxSprite.complete || vfxSprite.naturalWidth === 0) return;

            const frameW = vfxSprite.width / 6;
            const frameH = vfxSprite.height / 3;
            const col = this.currentFrame % 6;
            const row = Math.floor(this.currentFrame / 6);

            const baseW = width * 0.2;
            const drawW = baseW * this.scale; 
            const drawH = drawW * (frameH / frameW);

            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.globalCompositeOperation = 'screen';
            ctx.drawImage(
                vfxSprite,
                col * frameW, row * frameH, frameW, frameH,
                -drawW / 2, -drawH / 2, drawW, drawH
            );
            ctx.restore();
        }
    }

    // ==========================================
    // 动画时间轴驱动引擎
    // ==========================================
    const GAME_CONFIG = {
        jumpDuration: 400,   
        jumpHeight: 60,      
        perfectMin: 2.4,     
        perfectMax: 3.5,     
        missThreshold: 3.6,  
        fallAnimTime: 300,   
        fallenTime: 400,     
        getUpTime: 300       
    };

    const gameState = {
        score: 0,
        lastTime: 0,
        ropeAngle: 0,        // 统一的绳子角度
        ropeSpeed: 0.0035    // 统一的绳子速度
    };
    
    class Character {
        constructor(x, y, type) {
            this.baseX = x;
            this.baseY = y;
            this.type = type; 
            this.state = 'IDLE'; 
            this.offsetY = 0;
            this.animTimer = 0; 
            this.jumpedThisLoop = false;
            this.fallType = 'NONE'; 
            this.willMiss = false; // 新增：是否在当前轮次刻意失误
            
            this.currentFrame = 0;
            this.frameTimer = 0;
            this.frameDuration = 200 + Math.random() * 50; 
        }

        jump(isSuccess) {
            if (this.state !== 'IDLE') return;
            this.animTimer = 0;
            this.currentFrame = 0;
            this.state = isSuccess ? 'JUMP_SUCC' : 'JUMP_FAIL';
            this.fallType = isSuccess ? 'NONE' : 'FROM_JUMP'; 
            this.jumpedThisLoop = true;
        }

        fallDirectly() {
            if (this.state !== 'IDLE') return;
            this.animTimer = 0;
            this.currentFrame = 0;
            this.state = 'FALL_DOWN';
            this.fallType = 'FROM_IDLE'; 
        }

        update(dt) {
            if (this.type === 'AI') {
                // 如果是AI，且没有被标记为即将失误，则在判定区自动跳跃 (统一使用 gameState.ropeAngle)
                if (gameState.ropeAngle >= GAME_CONFIG.perfectMin && 
                    gameState.ropeAngle <= GAME_CONFIG.perfectMax && 
                    this.state === 'IDLE' && 
                    !this.jumpedThisLoop && 
                    !this.willMiss) {
                    this.jump(true);
                }
            }

            if (this.state === 'IDLE') {
                this.frameTimer += dt; 
                if (this.frameTimer >= this.frameDuration) {
                    this.currentFrame = (this.currentFrame + 1) % 3; 
                    this.frameTimer = 0;
                }
            } 
            else if (this.state === 'JUMP_SUCC' || this.state === 'JUMP_FAIL') {
                this.animTimer += dt;
                let progress = this.animTimer / GAME_CONFIG.jumpDuration;
                
                if (progress >= 1) {
                    this.offsetY = 0;
                    if (this.state === 'JUMP_SUCC') {
                        this.state = 'IDLE'; 
                        this.currentFrame = 0; 
                        this.frameTimer = 0;   
                    } else {
                        this.state = 'FALLEN';
                        this.animTimer = 0;
                    }
                } else {
                    this.offsetY = -Math.sin(progress * Math.PI) * GAME_CONFIG.jumpHeight;
                    
                    if (progress <= 0.5) {
                        let p2 = progress * 2;
                        this.currentFrame = Math.min(5, Math.floor(p2 * 6));
                    } else {
                        let p2 = (progress - 0.5) * 2;
                        if (this.state === 'JUMP_SUCC') {
                            this.currentFrame = Math.min(5, Math.floor(p2 * 6));
                        } else {
                            this.currentFrame = Math.min(4, Math.floor(p2 * 5)); 
                        }
                    }
                }
            } 
            else if (this.state === 'FALL_DOWN') {
                this.animTimer += dt;
                let progress = Math.min(this.animTimer / GAME_CONFIG.fallAnimTime, 1);
                this.currentFrame = Math.min(5, Math.floor(progress * 6));
                
                if (progress >= 1) {
                    this.state = 'FALLEN';
                    this.animTimer = 0; 
                }
            } 
            else if (this.state === 'FALLEN') {
                this.animTimer += dt;
                if (this.animTimer >= GAME_CONFIG.fallenTime) {
                    this.state = 'GETUP';
                    this.animTimer = 0;
                    this.currentFrame = 0;
                }
            } 
            else if (this.state === 'GETUP') {
                this.animTimer += dt;
                let progress = Math.min(this.animTimer / GAME_CONFIG.getUpTime, 1);
                this.currentFrame = Math.min(5, Math.floor(progress * 6));

                if (progress >= 1) {
                    this.state = 'IDLE';
                    this.animTimer = 0;
                    this.currentFrame = 0;
                }
            }
        }

        draw(ctx) {
            ctx.save();
            ctx.translate(this.baseX, this.baseY);

            // 动态投影绘制
            // 将投影相关的参数统一放大 20%
            let shadowRadiusX = width * 0.042; // 原为 0.035
            let shadowRadiusY = width * 0.01;  // 原为 0.0084
            let shadowAlpha = 0.4;
            let shadowOffsetY = -width * 0.018; // 原为 0.015

            if (this.state === 'JUMP_SUCC' || this.state === 'JUMP_FAIL') {
                let jumpFactor = Math.abs(this.offsetY) / GAME_CONFIG.jumpHeight; 
                shadowRadiusX *= (1 - jumpFactor * 0.5); 
                shadowRadiusY *= (1 - jumpFactor * 0.5);
                shadowAlpha *= (1 - jumpFactor * 0.6);   
            } else if (this.state === 'FALL_DOWN' || this.state === 'FALLEN' || this.state === 'GETUP') {
                let fallFactor = 0;
                if (this.state === 'FALL_DOWN') {
                    fallFactor = this.currentFrame / 5; 
                } else if (this.state === 'FALLEN') {
                    fallFactor = 1;                     
                } else if (this.state === 'GETUP') {
                    fallFactor = 1 - (this.currentFrame / 5); 
                }
                
                shadowRadiusX *= (1 + fallFactor * 0.28); 
                shadowRadiusY *= (1 + fallFactor * 0.07); 
                shadowAlpha = 0.4 + fallFactor * 0.15;   
            }

            ctx.fillStyle = `rgba(0, 0, 0, ${shadowAlpha})`;
            ctx.beginPath();
            ctx.ellipse(0, shadowOffsetY, shadowRadiusX, shadowRadiusY, 0, 0, Math.PI * 2);
            ctx.fill();

            // 角色身体绘制
            ctx.translate(0, this.offsetY);

            let currentSprite = idleSprite;
            let totalFrames = 3;

            if (this.state === 'JUMP_SUCC' || this.state === 'JUMP_FAIL') {
                let progress = this.animTimer / GAME_CONFIG.jumpDuration;
                if (progress <= 0.5) {
                    currentSprite = jumpUpSprite;
                    totalFrames = 6;
                } else {
                    if (this.state === 'JUMP_SUCC') {
                        currentSprite = jumpDownSuccSprite;
                        totalFrames = 6;
                    } else {
                        currentSprite = jumpDownFailSprite;
                        totalFrames = 5;
                    }
                }
            } else if (this.state === 'FALL_DOWN') {
                currentSprite = fallSprite;
                totalFrames = 6;
            } else if (this.state === 'FALLEN') {
                if (this.fallType === 'FROM_JUMP') {
                    currentSprite = jumpDownFailSprite;
                    totalFrames = 5;
                    this.currentFrame = 4;
                } else {
                    currentSprite = fallSprite;
                    totalFrames = 6;
                    this.currentFrame = 5;
                }
            } else if (this.state === 'GETUP') {
                currentSprite = getupSprite;
                totalFrames = 6;
            }

            if (currentSprite.complete && currentSprite.naturalWidth > 0) {
                const frameW = currentSprite.width / totalFrames; 
                const frameH = currentSprite.height;
                // 将角色本身的绘制宽度放大 20%
                const drawW = width * 0.192; // 原为 0.16
                const drawH = drawW * (frameH / frameW); 

                // 玩家独有的红色指示箭头 (跟随角色头部位置动态调整)
                if (this.type === 'PLAYER') {
                    ctx.fillStyle = '#e74c3c';
                    ctx.beginPath();
                    ctx.moveTo(-6, -drawH - 14);
                    ctx.lineTo(6, -drawH - 14);
                    ctx.lineTo(0, -drawH - 5);
                    ctx.fill();
                }

                ctx.drawImage(
                    currentSprite,
                    this.currentFrame * frameW, 0, frameW, frameH, 
                    -drawW / 2, -drawH, drawW, drawH               
                );
            }

            ctx.restore();
        }
    }

    function drawRope(team, isFront) {
        let leftX = -width * 0.1;
        let rightX = width * 1.1;
        let ropeBaseY = team.groundY - height * 0.06; 
        
        let swingRadiusY = height * 0.08; 
        // 统一使用全局角度
        let ropeCenterYOffset = -Math.cos(gameState.ropeAngle) * swingRadiusY;
        let controlY = ropeBaseY + ropeCenterYOffset * 1.8; 

        let zDepth = Math.sin(gameState.ropeAngle); 
        if (isFront && zDepth < 0) return; 
        if (!isFront && zDepth >= 0) return; 

        ctx.save();
        ctx.beginPath();
        ctx.moveTo(leftX, ropeBaseY);
        ctx.quadraticCurveTo(width / 2, controlY, rightX, ropeBaseY);
        
        let visualDepth = (zDepth + 1) / 2; 
        let ropeWidth = 2 + visualDepth * 3; 
        
        ctx.lineWidth = ropeWidth + 4;
        ctx.strokeStyle = '#000000';
        ctx.stroke();

        ctx.lineWidth = ropeWidth;
        ctx.strokeStyle = '#f1c40f';
        ctx.stroke();
        
        ctx.restore();
    }

    function spawnVFX() {
        const containerRect = document.getElementById('mobile-container').getBoundingClientRect();
        const scoreRect = scoreEl.getBoundingClientRect();
        const vfxX = (scoreRect.left - containerRect.left) + scoreRect.width / 2;
        const vfxY = (scoreRect.top - containerRect.top) + scoreRect.height / 2;
        activeVFX.push(new ComboVFX(vfxX, vfxY));
    }

    // 核心判定转移到每只独立的队伍
    function checkRopePass(team) {
        team.chars.forEach(c => {
            if (c.state === 'IDLE') {
                c.fallDirectly();
                if (c.type === 'PLAYER') gameState.score = 0; 
            } else if (c.state === 'JUMP_SUCC') {
                if (c.type === 'PLAYER') {
                    gameState.score++;
                    spawnVFX(); // 触发特效
                }
            }
        });
    }

    function updateUI() {
        scoreEl.innerText = gameState.score;
        const totalAngle = Math.PI * 2;
        
        const percentMin = (GAME_CONFIG.perfectMin / totalAngle) * 100;
        const percentMax = (GAME_CONFIG.perfectMax / totalAngle) * 100;
        // 统一使用全局角度
        const currentPercent = (gameState.ropeAngle / totalAngle) * 100;

        timingZoneEl.style.left = `${percentMin}%`;
        timingZoneEl.style.width = `${percentMax - percentMin}%`;
        timingCursorEl.style.left = `${currentPercent}%`;
        
        if (gameState.ropeAngle >= GAME_CONFIG.perfectMin && gameState.ropeAngle <= GAME_CONFIG.perfectMax) {
            timingZoneEl.classList.add('active');
            timingCursorEl.classList.add('active');
        } else {
            timingZoneEl.classList.remove('active');
            timingCursorEl.classList.remove('active');
        }
    }

    function handleInput() {
        // 输入永远只控制拥有玩家的那支队伍
        const playerTeam = teams[0];
        const player = playerTeam.chars.find(c => c.type === 'PLAYER');
        
        if (!player || player.state !== 'IDLE' || player.jumpedThisLoop) return;

        // 统一判断全局角度
        const isSuccess = gameState.ropeAngle >= GAME_CONFIG.perfectMin && gameState.ropeAngle <= GAME_CONFIG.perfectMax;
        player.jump(isSuccess);

        if (!isSuccess) {
            gameState.score = 0; 
        }
    }

    document.getElementById('mobile-container').addEventListener('mousedown', handleInput);
    document.getElementById('mobile-container').addEventListener('touchstart', (e) => {
        e.preventDefault(); 
        handleInput();
    }, {passive: false});

    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space' || e.key === ' ') {
            e.preventDefault(); 
            handleInput();
        }
    });

    function update(dt) {
        // 更新队伍角色状态
        teams.forEach(team => {
            team.chars.forEach(c => c.update(dt));
        });
        
        const prevAngle = gameState.ropeAngle;
        gameState.ropeAngle += gameState.ropeSpeed * dt;

        // 统一判断绳子是否扫过检查点
        if (prevAngle <= GAME_CONFIG.missThreshold && gameState.ropeAngle > GAME_CONFIG.missThreshold) {
            teams.forEach(team => checkRopePass(team));
        }

        // 一圈结束，触发重置与随机变速
        if (gameState.ropeAngle >= Math.PI * 2) {
            gameState.ropeAngle %= (Math.PI * 2);
            
            teams.forEach(team => {
                team.chars.forEach(c => {
                    c.jumpedThisLoop = false;
                    // 【AI 随机失误核心】：每回合有 10% 的概率让某个AI忘记跳跃
                    if (c.type === 'AI') {
                        c.willMiss = Math.random() < 0.10;
                    }
                });
            });
            
            const speedMultiplier = 0.6 + Math.random() * 1.2;
            gameState.ropeSpeed = 0.0035 * speedMultiplier;
        }
        
        // 更新特效
        activeVFX.forEach(vfx => vfx.update(dt));
        activeVFX = activeVFX.filter(vfx => !vfx.isFinished);
    }

    function draw() {
        ctx.clearRect(0, 0, width, height);
        
        // 按队伍的Y坐标排序，确保底下的队伍渲染在上面，产生正确的遮挡关系
        teams.sort((a, b) => a.groundY - b.groundY).forEach(team => {
            drawRope(team, false); 
            team.chars.sort((a, b) => a.baseY - b.baseY).forEach(c => c.draw(ctx));
            drawRope(team, true);  
        });
        
        activeVFX.forEach(vfx => vfx.draw(ctx));
        updateUI();
    }

    function gameLoop(timestamp) {
        if (!gameState.lastTime) gameState.lastTime = timestamp;
        const dt = timestamp - gameState.lastTime;
        gameState.lastTime = timestamp;

        if (dt < 100) {
            update(dt);
            draw();
        }
        requestAnimationFrame(gameLoop);
    }

    resize();
    requestAnimationFrame(gameLoop);

</script>
</body>
</html>
